<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استبيان رضا العملاء</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: #f0f4f8;
    color: #1a2530;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .survey-container {
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
  }

  .survey-header {
    background: linear-gradient(135deg, #0a1628, #1a3a5c);
    color: #fff;
    padding: 30px 24px;
    border-radius: 16px 16px 0 0;
    text-align: center;
  }

  .survey-header h1 {
    font-family: 'Tajawal', sans-serif;
    font-size: 26px;
  }

  .survey-header p {
    color: #cbd5e1;
    margin-top: 8px;
  }

  .survey-card {
    background: #fff;
    padding: 24px;
    border-radius: 0 0 16px 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
  }

  .survey-card h2 {
    font-family: 'Tajawal', sans-serif;
    font-size: 18px;
    color: #0a1628;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .survey-card h2 .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #0FA3A3;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
  }

  .field label .req {
    color: #e74c5e;
  }
  .field label .opt {
    color: #64748b;
    font-weight: 400;
    font-size: 12px;
  }

  .field select,
  .field textarea,
  .field input {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    transition: 0.3s;
    background: #fff;
  }

  .field select:focus,
  .field textarea:focus,
  .field input:focus {
    border-color: #0FA3A3;
    outline: none;
    box-shadow: 0 0 0 4px rgba(15, 163, 163, 0.1);
  }

  .field textarea {
    min-height: 80px;
    resize: vertical;
  }

  .rating-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #e2e8f0;
    gap: 12px;
  }

  .rating-row:last-child {
    border-bottom: none;
  }

  .rating-label {
    font-weight: 600;
    font-size: 14px;
    flex: 1;
  }

  .signal {
    display: flex;
    align-items: flex-end;
    gap: 5px;
    cursor: pointer;
    padding: 4px 2px;
  }

  .signal .bar {
    width: 10px;
    background: #e2e8f0;
    border-radius: 3px;
    transition: 0.2s;
  }

  .signal .bar:nth-child(1) { height: 12px; }
  .signal .bar:nth-child(2) { height: 18px; }
  .signal .bar:nth-child(3) { height: 24px; }
  .signal .bar:nth-child(4) { height: 30px; }
  .signal .bar:nth-child(5) { height: 36px; }

  .signal.filled-1 .bar:nth-child(-n+1),
  .signal.filled-2 .bar:nth-child(-n+2),
  .signal.filled-3 .bar:nth-child(-n+3),
  .signal.filled-4 .bar:nth-child(-n+4),
  .signal.filled-5 .bar:nth-child(-n+5) {
    background: #0FA3A3;
  }

  .rating-value {
    font-weight: 700;
    color: #0FA3A3;
    min-width: 24px;
    text-align: center;
  }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: #0FA3A3;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Tajawal', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
  }

  .submit-btn:hover {
    background: #0A7A7A;
    transform: translateY(-2px);
  }
  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .error-msg {
    color: #e74c5e;
    font-size: 14px;
    margin-top: 12px;
    display: none;
    text-align: center;
  }

  #thankyou {
    display: none;
    text-align: center;
    padding: 40px 20px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
  }

  #thankyou .icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #2ecc71;
    color: #fff;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .toast-container {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    background: #fff;
    padding: 12px 24px;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    font-weight: 600;
    animation: slideIn 0.4s ease;
    border-right: 4px solid #0FA3A3;
  }

  .toast.success {
    border-right-color: #2ecc71;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @media (max-width: 720px) {
    body { padding: 12px; }
    .survey-header h1 { font-size: 22px; }
    .survey-card { padding: 16px; }
  }
</style>
</head>
<body>

<div class="survey-container">

  <div class="survey-header">
    <img src="logo.png" alt="شعار شبكاتي ستور للاتصالات" style="width:140px;height:140px;object-fit:contain;background:#fff;border-radius:14px;padding:6px;margin-bottom:10px;box-shadow:0 3px 10px rgba(0,0,0,0.2);">
    <h1 style="font-size:20px;">شبكاتي ستور للاتصالات</h1>
    <p style="margin-top:6px;">نرجو تقييم تجربتك معنا لمساعدتنا على التطوير المستمر 🙏</p>
  </div>

  <form id="surveyForm" class="survey-card">
    <h2><span class="dot"></span>معلومات الزيارة</h2>

    <div class="field">
      <label>الموظف <span class="req">*</span></label>
      <select id="employee" required>
        <option value="">اختر الموظف</option>
      </select>
    </div>

    <div class="field">
      <label>نوع الخدمة <span class="req">*</span></label>
      <select id="service" required>
        <option value="">اختر نوع الخدمة</option>
      </select>
    </div>

    <div class="field">
      <label>رقم العميل <span class="opt">(اختياري - رقم الجوال)</span></label>
      <input type="tel" id="customerNumber" placeholder="مثال: 05xxxxxxxx">
    </div>

    <h2 style="margin-top:24px;"><span class="dot"></span>تقييم تجربتك</h2>
    <div id="ratingsWrap"></div>
    <p style="font-size:12px;color:#64748b;margin:10px 0 0;">اضغط على الأعمدة لتحديد التقييم من 1 إلى 5</p>

    <h2 style="margin-top:24px;"><span class="dot"></span>ملاحظات إضافية</h2>
    <div class="field">
      <label>تعليقك <span class="opt">(اختياري)</span></label>
      <textarea id="comments" placeholder="اكتب ملاحظاتك أو اقتراحاتك هنا..."></textarea>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">📤 إرسال الاستبيان</button>
    <div class="error-msg" id="errorMsg">يرجى تعبئة جميع الحقول المطلوبة وتقييم جميع العناصر</div>
  </form>

  <div id="thankyou">
    <div class="icon">✓</div>
    <h2 style="font-family:'Tajawal',sans-serif;color:#0a1628;">شكراً لك!</h2>
    <p style="color:#64748b;">تم إرسال تقييمك بنجاح! نقدّر وقتك! 🙏</p>
  </div>

</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
  // ================================================================
  //  البيانات الثابتة
  // ================================================================
  // ضعي هنا رابط الـ Web App اللي حصلتي عليه بعد نشر Apps Script (ينتهي بـ /exec)
  // لو تركتيه فاضي، النظام هيشتغل محلياً فقط (نفس الجهاز) كما كان قبل كده
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqh0CZz_bNa-Cyx_QoFaUJrVHH8RI0CtP7eca7Wa329JF-m1opplINRZZQt995SB0R/exec';

  // هذه القائمة ستُستخدم فقط كاحتياطي في حالة عدم وجود بيانات في localStorage
  const DEFAULT_EMPLOYEES = ['ماجد الجمعان', 'مهدي الحاجي', 'باسم محمد', 'حسين البراهيم'];
  const SERVICES = ['جوالات', 'إكسسوارات', 'خدمات الإنترنت'];
  const RATING_ITEMS = [
    { id: 'service_quality', label: 'جودة الخدمة' },
    { id: 'employee_quality', label: 'جودة الموظف' },
    { id: 'employee_manner', label: 'أسلوب الموظف في التعامل' },
    { id: 'satisfaction', label: 'مستوى رضا العميل' }
  ];

  // ================================================================
  //  الحالة العامة
  // ================================================================
  let ratingValues = {};
  const STORAGE_KEY = 'survey_responses';
  const EMPLOYEES_KEY = 'survey_employees';
  const BRANCHES_KEY = 'survey_branches';

  // ================================================================
  //  ربط الموظفين بالفروع (قابل للتعديل من لوحة التحكم)
  // ================================================================
  // هيكل التخزين: { employeeName: branchName }
  const EMPLOYEE_BRANCH_KEY = 'survey_employee_branch';

  // القيم الافتراضية
  const DEFAULT_EMPLOYEE_BRANCH = {
    'ماجد الجمعان': 'فرع النزهة',
    'مهدي الحاجي': 'فرع النزهة',
    'باسم محمد': 'فرع النزهة',
    'حسين البراهيم': 'فرع المنيزلة'
  };

  // ================================================================
  //  دوال مساعدة
  // ================================================================
  function $(id) { return document.getElementById(id); }

  function showToast(msg, type = 'info', duration = 4000) {
    const container = $('toastContainer');
    const div = document.createElement('div');
    div.className = `toast ${type}`;
    div.textContent = msg;
    container.appendChild(div);
    setTimeout(() => div.remove(), duration);
  }

  function fillSelect(el, items, placeholder = 'اختر...') {
    el.innerHTML = `<option value="">${placeholder}</option>`;
    items.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v;
      el.appendChild(opt);
    });
  }

  function loadResponses() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    } catch (e) {
      return [];
    }
  }

  function saveResponses(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      return true;
    } catch (e) {
      return false;
    }
  }

  // ================================================================
  //  إدارة الموظفين
  // ================================================================
  function loadEmployeesLocal() {
    try {
      const data = localStorage.getItem(EMPLOYEES_KEY);
      if (data) {
        const parsed = JSON.parse(data);
        if (Array.isArray(parsed) && parsed.length) return parsed;
      }
    } catch (e) {}
    localStorage.setItem(EMPLOYEES_KEY, JSON.stringify(DEFAULT_EMPLOYEES));
    return [...DEFAULT_EMPLOYEES];
  }

  async function loadEmployees() {
    if (!APPS_SCRIPT_URL) return loadEmployeesLocal();
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=employees`);
      const data = await res.json();
      if (data.status === 'success' && Array.isArray(data.employees) && data.employees.length) {
        return data.employees;
      }
      return loadEmployeesLocal();
    } catch (err) {
      console.error('تعذر تحميل الموظفين من الشيت، سيتم استخدام النسخة المحلية:', err);
      return loadEmployeesLocal();
    }
  }

  // ================================================================
  //  إدارة ربط الموظفين بالفروع
  // ================================================================
  function loadEmployeeBranchLocal() {
    try {
      const data = localStorage.getItem(EMPLOYEE_BRANCH_KEY);
      if (data) {
        const parsed = JSON.parse(data);
        if (typeof parsed === 'object' && parsed !== null) return parsed;
      }
    } catch (e) {}
    localStorage.setItem(EMPLOYEE_BRANCH_KEY, JSON.stringify(DEFAULT_EMPLOYEE_BRANCH));
    return { ...DEFAULT_EMPLOYEE_BRANCH };
  }

  function saveEmployeeBranchLocal(map) {
    try {
      localStorage.setItem(EMPLOYEE_BRANCH_KEY, JSON.stringify(map));
      return true;
    } catch (e) {
      return false;
    }
  }

  async function loadEmployeeBranch() {
    if (!APPS_SCRIPT_URL) return loadEmployeeBranchLocal();
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=employeeBranch`);
      const data = await res.json();
      if (data.status === 'success' && typeof data.map === 'object' && data.map !== null) {
        saveEmployeeBranchLocal(data.map);
        return data.map;
      }
      return loadEmployeeBranchLocal();
    } catch (err) {
      console.error('تعذر تحميل ربط الموظفين بالفروع من الشيت، سيتم استخدام النسخة المحلية:', err);
      return loadEmployeeBranchLocal();
    }
  }

  // جلب الفرع التابع لموظف معين
  function getBranchForEmployee(employeeName, employeeBranchMap) {
    if (!employeeName) return null;
    // البحث المباشر
    if (employeeBranchMap[employeeName]) {
      return employeeBranchMap[employeeName];
    }
    // البحث بدون تشكيل أو اختلافات بسيطة (تطابق تام)
    for (const [key, value] of Object.entries(employeeBranchMap)) {
      if (key.trim() === employeeName.trim()) {
        return value;
      }
    }
    return null;
  }

  // ================================================================
  //  تهيئة النموذج
  // ================================================================
  async function initSurvey() {
    // تحميل الموظفين
    const employees = await loadEmployees();
    fillSelect($('employee'), employees);

    // تحميل الخدمات
    fillSelect($('service'), SERVICES);

    // تحميل ربط الموظفين بالفروع (سيُستخدم عند الإرسال)
    const employeeBranchMap = await loadEmployeeBranch();

    // تهيئة عناصر التقييم
    const wrap = $('ratingsWrap');
    ratingValues = {};

    RATING_ITEMS.forEach(item => {
      ratingValues[item.id] = 0;

      const row = document.createElement('div');
      row.className = 'rating-row';

      const label = document.createElement('div');
      label.className = 'rating-label';
      label.innerHTML = `${item.label} <span class="req">*</span>`;

      const signal = document.createElement('div');
      signal.className = 'signal';
      for (let i = 1; i <= 5; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.dataset.value = i;
        signal.appendChild(bar);
      }

      const value = document.createElement('div');
      value.className = 'rating-value';
      value.textContent = '-';

      signal.addEventListener('click', (e) => {
        const barEl = e.target.closest('.bar');
        if (!barEl) return;
        const idx = parseInt(barEl.dataset.value, 10);
        ratingValues[item.id] = idx;
        signal.className = `signal filled-${idx}`;
        value.textContent = idx;
      });

      row.appendChild(label);
      row.appendChild(signal);
      row.appendChild(value);
      wrap.appendChild(row);
    });

    // تخزين الخريطة في نطاق الدالة لاستخدامها عند الإرسال
    window._employeeBranchMap = employeeBranchMap;
  }

  // ================================================================
  //  إرسال الاستبيان
  // ================================================================
  $('surveyForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const employee = $('employee').value;
    const service = $('service').value;
    const customerNumber = $('customerNumber').value.trim();
    const comments = $('comments').value.trim();

    const allRated = RATING_ITEMS.every(item => ratingValues[item.id] > 0);
    if (!employee || !service || !allRated) {
      $('errorMsg').style.display = 'block';
      return;
    }
    $('errorMsg').style.display = 'none';

    // الحصول على الفرع التابع للموظف
    const branch = getBranchForEmployee(employee, window._employeeBranchMap || {});
    if (!branch) {
      showToast('⚠️ هذا الموظف غير مرتبط بفرع، يرجى التواصل مع الإدارة', 'error');
      return;
    }

    const btn = $('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ جاري الإرسال...';

    try {
      const data = {
        id: Date.now(),
        branch: branch, // يتم تعيينه تلقائياً بناءً على الموظف
        employee: employee,
        service: service,
        customerNumber: customerNumber,
        ratings: { ...ratingValues },
        comments: comments,
        created_at: new Date().toISOString()
      };

      // نسخة محلية
      const currentData = loadResponses();
      currentData.push(data);
      saveResponses(currentData);

      // إرسال إلى Google Sheets
      if (APPS_SCRIPT_URL) {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'addResponse', ...data })
        });
      }

      showToast('✅ تم إرسال تقييمك بنجاح!', 'success');
      $('surveyForm').style.display = 'none';
      $('thankyou').style.display = 'block';

    } catch (err) {
      console.error('❌ فشل الإرسال:', err);
      showToast('❌ فشل الإرسال: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '📤 إرسال الاستبيان';
    }
  });

  // ================================================================
  //  بدء التطبيق
  // ================================================================
  initSurvey();
  console.log('✅ تم تهيئة الاستبيان بنجاح');
  console.log('📌 يتم ربط الفرع تلقائياً بناءً على الموظف المختار');
</script>

</body>
</html>
